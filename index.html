<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Authentication</title>
    <style>
      /* Critical inline CSS — fallback if CDN is unavailable */
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; }
      [data-theme="dark"] { background: #1a1a1a; color: #e0e0e0; }
      .page { width: 100%; max-width: 480px; padding: 1rem; box-sizing: border-box; }
      .status-container { text-align: center; background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
      [data-theme="dark"] .status-container { background: #2a2a2a; }
      .status-container h2 { margin: 0.75rem 0 0.5rem; }
      .status-container p { margin: 0.25rem 0; opacity: 0.7; font-size: 0.95rem; }
      .error .error-icon { font-size: 2.5rem; }
      .error-message { font-weight: 500; }
      .error-details { font-size: 0.85rem; opacity: 0.6; }
      .btn { display: inline-block; margin-top: 1rem; padding: 0.6rem 1.4rem; border: none; border-radius: 8px; background: #3b82f6; color: #fff; font-size: 0.95rem; cursor: pointer; text-decoration: none; }
      .btn:hover { background: #2563eb; }
      .btn--secondary { background: transparent; color: #3b82f6; border: 1px solid #3b82f6; margin-left: 0.5rem; }
      .btn--secondary:hover { background: rgba(59,130,246,0.08); }
      .spinner { width: 40px; height: 40px; border: 3px solid #e0e0e0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .provider-icon { display: flex; justify-content: center; align-items: center; }
      .success-icon { font-size: 2.5rem; color: #22c55e; }
      .slow-notice { margin-top: 1rem; font-size: 0.85rem; opacity: 0.5; }
      .context-domain { font-size: 0.85rem; opacity: 0.5; margin-top: 0.5rem; }
    </style>
    <link rel="preload" href="https://cdn.cals-api.com/stylesheets/main.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdn.cals-api.com/stylesheets/main.css"></noscript>
  </head>
  <body>
    <div id="content" class="page">
      <div class="status-container">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
